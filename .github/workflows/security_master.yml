# ==========================================
# 🛡️ SECURITY & INTEGRITY MASTER WORKFLOW
# ==========================================
name: 🛡️ Security & Integrity Master

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  # --- JOB 1: SECRET SCANNING ---
  secrets_scan:
    name: GitGuardian Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: GitGuardian Scan
        uses: GitGuardian/ggshield-action@v1.48.0
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  # --- JOB 2: SPATIAL INTEGRITY ---
  spatial_audit:
    name: Spatial Integrity Audit
    runs-on: ubuntu-latest
    needs: secrets_scan
    outputs:
      drift: ${{ steps.calc_drift.outputs.drift_val }}
      status_icon: ${{ steps.calc_drift.outputs.status_icon }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install numpy

      - id: calc_drift
        name: Execute Spatial Audit
        run: |
          OUTPUT=$(python utilities/check_spatial_audit.py)
          DRIFT=$(echo "$OUTPUT" | grep "DRIFT_VALUE:" | cut -d':' -f2 | xargs)
          STATUS=$(echo "$OUTPUT" | grep "DRIFT_STATUS:" | cut -d':' -f2 | xargs)
          echo "drift_val=$DRIFT" >> $GITHUB_OUTPUT
          echo "status_icon=$STATUS" >> $GITHUB_OUTPUT

  # --- JOB 3: GENERATE REPORT ARTIFACT ---
  generate_report:
    name: Generate Security Artifact
    runs-on: ubuntu-latest
    needs: [secrets_scan, spatial_audit]
    if: always()
    steps:
      - name: Create Report Summary
        run: |
          echo "===========================================" > security_report.txt
          echo "🛡️ NOAA PROJECT SECURITY REPORT" >> security_report.txt
          echo "Generated: $(date)" >> security_report.txt
          echo "Run ID: ${{ github.run_id }}" >> security_report.txt
          echo "===========================================" >> security_report.txt
          echo "SECRET SCAN STATUS: ${{ needs.secrets_scan.result }}" >> security_report.txt
          echo "SPATIAL AUDIT STATUS: ${{ needs.spatial_audit.result }}" >> security_report.txt
          echo "MEASURED DRIFT: ${{ needs.spatial_audit.outputs.drift }} km" >> security_report.txt
          echo "===========================================" >> security_report.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-integrity-report
          path: security_report.txt
          retention-days: 5

  # --- JOB 4: UPDATE README DASHBOARD ---
  update_readme:
    name: Update README Stats
    runs-on: ubuntu-latest
    needs: [generate_report, spatial_audit]
    if: success()
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
            token: ${{ secrets.GH_PAT }}
            ref: main # <--- PERMANENT FIX PART 1: Ensures we are on the branch head

      - name: Inject Stats into README
        run: |
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M')
          DRIFT="${{ needs.spatial_audit.outputs.drift }}"
          ICON="${{ needs.spatial_audit.outputs.status_icon }}"
          sed -i "s|Last Health Check: [^|]*|Last Health Check: $TIMESTAMP |g" README.md
          sed -i "s|Drift: .*|Drift: $ICON $DRIFT km_|g" README.md

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md

          # PERMANENT FIX PART 2: Robust Push Logic
          # Only commit if changes exist to prevent 'nothing to commit' failures
          git diff-index --quiet HEAD || git commit -m "chore: auto-update health stats [skip ci]"

          # Explicitly push the current HEAD to the remote 'main' branch
          git push origin HEAD:main

  # --- JOB 5: WORKSPACE CLEANUP ---
  cleanup_workspace:
    name: Repository Sweep
    runs-on: ubuntu-latest
    needs: [update_readme]
    if: always()
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Remove Temporary Files
        run: |
          rm -f security_report.txt
          find . -type d -name "__pycache__" -exec rm -rf {} +
          echo "✅ Runner workspace sanitized."
