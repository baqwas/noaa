# ==============================================================================
# PROJECT: NASA NOAA Data Pipeline
# FILENAME: security_scan.yml
# DESCRIPTION: Automated Secret Detection Pipeline
#
# LOGIC:
#   This workflow utilizes GitGuardian (ggshield) to scan every push and 
#   pull request for hardcoded secrets (API keys, passwords, tokens). 
#   It acts as a server-side "fail-safe" to prevent compromised credentials 
#   from being merged into the codebase.
#
# DEPENDENCIES:
#   - GitGuardian API Key (Stored in GitHub Actions Secrets)
#   - GitGuardian/ggshield-action
#
# AUTHOR: Matha Goram
# VERSION: 1.0.0
# LAST UPDATED: 2026-02-27
# ==============================================================================

name: GitGuardian Scan

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  scanning:
    name: GitGuardian Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Essential for scanning full history/deltas

      - name: GitGuardian scan
        uses: GitGuardian/ggshield-action@v1.27.0
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_PULL_REQUEST_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

